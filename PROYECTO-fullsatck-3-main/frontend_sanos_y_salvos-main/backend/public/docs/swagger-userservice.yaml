openapi: 3.0.0
info:
  title: Sanos y Salvos - UserService API
  version: 1.0.0
  description: Servicio de gestión de usuarios y autenticación
  contact:
    name: Equipo Desarrollo

servers:
  - url: http://localhost:8002
    description: Servidor Local

paths:
  /users:
    get:
      summary: Listar usuarios
      tags:
        - Usuarios
      parameters:
        - name: page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

    post:
      summary: Crear usuario
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Usuario creado

  /users/{id}:
    get:
      summary: Obtener usuario
      tags:
        - Usuarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    put:
      summary: Actualizar usuario
      tags:
        - Usuarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Usuario actualizado

    delete:
      summary: Eliminar usuario
      tags:
        - Usuarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Usuario eliminado

  /token:
    post:
      summary: Obtener token JWT
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token obtenido
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                  refresh:
                    type: string

  /token/refresh:
    post:
      summary: Refrescar token
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
      responses:
        '200':
          description: Token refrescado

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        full_name:
          type: string
        phone:
          type: string
        is_active:
          type: boolean
        date_joined:
          type: string
          format: date-time

    UserCreate:
      type: object
      required:
        - username
        - email
        - password
        - full_name
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        full_name:
          type: string
        phone:
          type: string

    UserUpdate:
      type: object
      properties:
        email:
          type: string
        full_name:
          type: string
        phone:
          type: string
